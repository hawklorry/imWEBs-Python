project:
  type: website
  output-dir: publish

website:
  title: "imWEBs"
  page-footer: "© 2024 University of Guelph"
  repo-url: https://github.com/hawklorry/imWEBs-Python
  repo-actions: [edit]
  repo-subdir: docs
  page-navigation: true
  bread-crumbs: false 
    
  sidebar:
    style: docked
    search: true
    contents: 
      - section: "User Guide"
        href: index.qmd
        contents:
        - user-guide/model_config.qmd 
        - user-guide/scenario_config.qmd     
      - section: "BMPs"
        href: bmps/bmps.qmd
        contents: 
        - bmps/02_point_source.qmd
        - bmps/03_reservoir.qmd
        - bmps/06_grassed_waterway.qmd
        - bmps/19_tiledrain.qmd
        - bmps/27_manure_storage.qmd
        - bmps/28_manure_catch_basin.qmd
        - bmps/29_manure_feedlot.qmd
        - bmps/41_wascob.qmd        
        - bmps/crop_management.qmd
           
format:
  html:
    theme: cosmo
    toc: true
  ipynb: 
    theme: cosmo
    toc: true

execute:
  freeze: auto